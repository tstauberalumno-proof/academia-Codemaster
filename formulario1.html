<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario individual</title>
</head>

<body>

    <header>
        <nav>
            <ul>
                <li>
                    <a href="formulario1.html">
                        Formulario individual
                    </a>
                </li>

                <li>
                    <a href="formulario_empresa.html">
                        Formulario empresarial
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>

        <section>

            <h1>Formulario individual</h1>

            <form action="mensaje.html">

                <div>
                    <label for="nombre">
                        Nombre
                    </label>
                    <br>

                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="apellido">
                        Apellido
                    </label>
                    <br>

                    <input 
                        type="text" 
                        id="apellido" 
                        name="apellido" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="dni">
                        DNI
                    </label>
                    <br>

                    <input 
                        type="number" 
                        id="dni" 
                        name="dni" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="email">
                        Email
                    </label>
                    <br>

                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="password">
                        Contraseña
                    </label>
                    <br>

                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                    >
                </div>

                <br>
                    
                <div>
                    <input 
                        type="submit" 
                        value="Inscribirme"
                    >
                </div>

            </form>

        </section>

    </main>

    <footer>
            <div>
                <p>
                    Academia-Codemaster - 2026
                </p>
            </div>
    </footer>
</body>
</html>
