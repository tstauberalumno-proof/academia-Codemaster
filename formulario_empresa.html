<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario empresarial</title>
</head>

<body>

    <header>
        <nav>
            <ul>
                <li>
                    <a href="formulario1.html">
                        Formulario individual
                    </a>
                </li>

                <li>
                    <a href="formulario_empresa.html">
                        Formulario empresarial
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>

        <section>

            <h1>Formulario empresarial</h1>

            <form action="mensaje.html">

                <div>
                    <label for="nombre_empresa">
                        Nombre de la empresa
                    </label>
                    <br>

                    <input 
                        type="text" 
                        id="nombre_empresa" 
                        name="nombre_empresa" 
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="email">
                        Email de la empresa
                    </label>
                    <br>

                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                    >
                </div>

                <br>

                <div>
                    <input 
                        type="submit" 
                        value="Inscribirme"
                    >
                </div>

            </form>

        </section>

    </main>

    <footer>
        <div>
            <p>
                Academia-Codemaster - 2026
            </p>
        </div>
    </footer>
</body>
</html>
